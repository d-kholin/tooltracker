services:
  tooltracker:
    build: .
    ports:
      - 5000:5000
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - TOOLTRACKER_DB=/data/tooltracker.db
    env_file:
      - .env
    volumes:
      - tooltracker_data:/data
    restart: unless-stopped

volumes:
  tooltracker_data:
    driver: local
